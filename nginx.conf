# Nginx reverse proxy configuration for production
# Place at /etc/nginx/sites-available/tubeai

upstream tubeai_backend {
  server 127.0.0.1:5000;
  keepalive 32;
}

upstream tubeai_frontend {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name your-domain.com;

  # Redirect all HTTP to HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name your-domain.com;

  # SSL configuration (use Let's Encrypt)
  ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # Security headers
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;
  gzip_min_length 256;

  # Frontend (Next.js)
  location / {
    proxy_pass http://tubeai_frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # Backend API
  location /api/ {
    proxy_pass http://tubeai_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Increase timeout for AI generation (can take up to 60s)
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # Disable buffering for streaming responses
    proxy_buffering off;
  }

  # Block access to sensitive files
  location ~ /.(env|git|htaccess) {
    deny all;
    return 404;
  }

  # Rate limiting (global)
  limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
  limit_req zone=global burst=50 nodelay;
}
