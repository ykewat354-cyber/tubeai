# GitHub Actions CI Pipeline
# Runs on every push and PR to main branch

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Backend Tests ----
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tubeai
          POSTGRES_USER: tubeuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tubeuser -d tubeai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://tubeuser:testpassword@localhost:5432/tubeai
        run: npx prisma migrate dev --name init

      - name: Run tests
        env:
          DATABASE_URL: postgresql://tubeuser:testpassword@localhost:5432/tubeai
          JWT_SECRET: ci-test-secret
          OPENAI_API_KEY: sk-fake-key-for-ci
        run: npm test

  # ---- Frontend Build ----
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build check (no deploy)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

  # ---- Docker Build Check ----
  docker-check:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (dry run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          load: true
          tags: tubeai-backend:test

      - name: Build frontend image (dry run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          tags: tubeai-frontend:test
